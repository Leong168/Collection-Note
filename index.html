<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Collection Note</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            input, textarea { border: none !important; background: transparent !important; }
            .container-box { border: 1px solid #000; box-shadow: none; width: 100% !important; }
        }
        .line-input { border-bottom: 1px solid #e2e8f0; width: 100%; outline: none; padding: 4px 0; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-10">

    <div class="max-w-4xl mx-auto bg-white shadow-xl rounded-lg container-box">
        <div class="bg-slate-800 text-white p-6 flex justify-between items-center print:bg-white print:text-black print:border-b">
            <h1 class="text-xl font-bold uppercase tracking-widest">Collection Note</h1>
            <button onclick="window.print()" class="no-print bg-emerald-600 px-4 py-2 rounded font-bold hover:bg-emerald-700 transition">
                PRINT FOR DRIVER
            </button>
        </div>

        <div class="p-8 space-y-6">
            <div class="grid grid-cols-2 gap-8">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Customer Name</label>
                    <input type="text" placeholder="Enter Name" class="line-input font-bold">
                    <label class="text-[10px] font-bold text-gray-400 uppercase mt-4 block">Collection Address</label>
                    <textarea placeholder="Enter Full Address" class="line-input text-sm" rows="2"></textarea>
                </div>
                <div class="text-right">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Requested By</label>
                    <input type="text" placeholder="Staff Name" class="line-input text-right">
                </div>
            </div>

            <div class="mt-8">
                <table class="w-full" id="mainTable">
                    <thead>
                        <tr class="border-b-2 border-slate-200 text-[10px] uppercase text-gray-500">
                            <th class="text-left pb-2 px-1">SKU</th>
                            <th class="text-left pb-2 px-1">Serial Number</th>
                            <th class="text-center pb-2 px-1 w-20">Qty</th>
                            <th class="no-print w-8"></th>
                        </tr>
                    </thead>
                    <tbody id="skuBody">
                        <tr class="border-b border-gray-100">
                            <td class="py-2 px-1"><input type="text" placeholder="SKU Code" class="line-input text-sm"></td>
                            <td class="py-2 px-1"><input type="text" placeholder="S/N" class="line-input text-sm"></td>
                            <td class="py-2 px-1 text-center"><input type="number" value="1" class="line-input text-center text-sm"></td>
                            <td class="no-print text-center">
                                <button onclick="deleteThisRow(this)" class="text-gray-300 hover:text-red-500 font-bold">×</button>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <button onclick="addNewLine()" type="button" class="no-print mt-4 text-indigo-600 font-bold text-sm flex items-center border border-indigo-100 px-3 py-1 rounded hover:bg-indigo-50">
                    + ADD MULTIPLE SKU
                </button>
            </div>

            <div class="pt-4">
                <label class="text-[10px] font-bold text-gray-400 uppercase">Remarks / Condition</label>
                <input type="text" placeholder="e.g. Wrapped in pallet film, missing power cable" class="line-input text-sm italic">
            </div>

            <div class="pt-16 pb-4">
                <div class="grid grid-cols-2 gap-16">
                    <div class="border-t border-black pt-2">
                        <p class="text-[10px] font-bold uppercase">Driver / Collected By</p>
                        <p class="text-[9px] text-gray-400">Signature & Date</p>
                    </div>
                    <div class="border-t border-black pt-2">
                        <p class="text-[10px] font-bold uppercase">IT Dept / Received By</p>
                        <p class="text-[9px] text-gray-400">Signature & Date</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        function addNewLine() {
            // Find the table body
            var tbody = document.getElementById("skuBody");
            
            // Create a new row element
            var row = document.createElement("tr");
            row.className = "border-b border-gray-100";
            
            // Insert the HTML for the new row
            row.innerHTML = `
                <td class="py-2 px-1"><input type="text" placeholder="SKU Code" class="line-input text-sm"></td>
                <td class="py-2 px-1"><input type="text" placeholder="S/N" class="line-input text-sm"></td>
                <td class="py-2 px-1 text-center"><input type="number" value="1" class="line-input text-center text-sm"></td>
                <td class="no-print text-center">
                    <button onclick="deleteThisRow(this)" class="text-gray-300 hover:text-red-500 font-bold">×</button>
                </td>
            `;
            
            // Add the row to the table
            tbody.appendChild(row);
        }

        function deleteThisRow(btn) {
            var row = btn.parentNode.parentNode;
            var tbody = document.getElementById("skuBody");
            
            // Only delete if more than one row exists
            if (tbody.rows.length > 1) {
                row.parentNode.removeChild(row);
            } else {
                alert("You need at least one item row.");
            }
        }
    </script>
</body>
</html>
