<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Collection Note - Final Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Force natural page flow so nothing is hidden */
        html, body {
            height: auto !important;
            overflow: auto !important;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .content-wrapper { 
                box-shadow: none !important; 
                border: none !important; 
                width: 100% !important; 
                margin: 0 !important;
                padding: 0 !important;
            }
            .input-field { border: none !important; border-bottom: 1px solid #000 !important; }
            /* Prevents the signature lines from splitting across two pages */
            .signature-section { page-break-inside: avoid; }
        }

        .input-field { width: 100%; border-bottom: 1px solid #cbd5e1; outline: none; padding: 6px; background: transparent; }
        .sku-textarea { min-height: 60px; resize: vertical; display: block; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-10">

    <div class="content-wrapper max-w-4xl mx-auto bg-white p-8 md:p-12 shadow-lg rounded-sm">
        
        <div class="flex justify-between items-center border-b-4 border-black pb-4 mb-10">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tighter">Collection Note</h1>
                <p class="text-gray-500 font-bold">IT ASSET MANAGEMENT</p>
            </div>
            <button onclick="window.print()" class="no-print bg-blue-600 text-white px-8 py-3 font-black rounded shadow-lg hover:bg-blue-700 active:scale-95 transition">
                PRINT HARDCOPY
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 mb-12">
            <div class="space-y-6">
                <div>
                    <label class="text-xs font-black uppercase text-gray-400">Customer Name</label>
                    <input type="text" placeholder="Enter Client Name" class="input-field font-bold text-xl">
                </div>
                <div>
                    <label class="text-xs font-black uppercase text-gray-400">Collection Address</label>
                    <textarea placeholder="Enter Pickup Address" class="input-field text-sm" rows="2"></textarea>
                </div>
            </div>
            <div class="md:text-right space-y-6">
                <div>
                    <label class="text-xs font-black uppercase text-gray-400">Requested By</label>
                    <input type="text" placeholder="Staff Name" class="input-field md:text-right font-bold text-lg">
                </div>
            </div>
        </div>

        <div class="mb-8">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="border-b-2 border-black text-sm font-black uppercase">
                        <th class="text-left py-2" style="width: 50%;">SKU / Item Description</th>
                        <th class="text-left py-2" style="width: 30%;">Serial Number</th>
                        <th class="text-center py-2" style="width: 10%;">Qty</th>
                        <th class="no-print py-2" style="width: 10%;"></th>
                    </tr>
                </thead>
                <tbody id="item-table-body">
                    <tr class="border-b border-gray-200">
                        <td class="py-4 pr-4">
                            <textarea placeholder="Type SKU Name (Wraps for long names)" class="input-field text-sm sku-textarea font-medium"></textarea>
                        </td>
                        <td class="py-4 px-2 align-top">
                            <input type="text" placeholder="S/N" class="input-field text-sm">
                        </td>
                        <td class="py-4 px-2 align-top text-center">
                            <input type="number" value="1" class="input-field text-center text-sm font-bold">
                        </td>
                        <td class="no-print py-4 text-center align-top">
                            <button onclick="removeRow(this)" class="text-red-600 font-black text-xs border border-red-200 px-2 py-1 rounded hover:bg-red-50">REMOVE</button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="mt-8 no-print">
                <button onclick="insertNewRow()" class="w-full border-4 border-dashed border-gray-200 py-6 text-gray-400 font-black text-lg hover:border-blue-400 hover:text-blue-500 hover:bg-blue-50 transition-all uppercase tracking-widest">
                    + Add Multiple SKU Items
                </button>
            </div>
        </div>

        <div class="mt-12">
            <label class="text-xs font-black uppercase text-gray-400 tracking-widest">Remarks / Condition</label>
            <input type="text" placeholder="e.g. Minor scratches, missing cables" class="input-field italic text-gray-700">
        </div>

        <div class="signature-section mt-24 mb-10 border-t-4 border-gray-50 pt-12">
            <div class="grid grid-cols-2 gap-16 md:gap-32">
                <div class="border-t-2 border-black pt-4">
                    <p class="text-sm font-black uppercase italic">Collected By (Driver)</p>
                    <p class="text-[10px] text-gray-400 mt-2 font-bold uppercase tracking-widest">Date & Time</p>
                </div>
                <div class="border-t-2 border-black pt-4 text-right">
                    <p class="text-sm font-black uppercase italic text-right">Received By (IT Dept)</p>
                    <p class="text-[10px] text-gray-400 mt-2 font-bold uppercase tracking-widest text-right">Date & Time</p>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        function insertNewRow() {
            var tableBody = document.getElementById('item-table-body');
            var row = document.createElement('tr');
            row.className = "border-b border-gray-200";
            
            row.innerHTML = `
                <td class="py-4 pr-4">
                    <textarea placeholder="Type SKU Name" class="input-field text-sm sku-textarea font-medium"></textarea>
                </td>
                <td class="py-4 px-2 align-top">
                    <input type="text" placeholder="S/N" class="input-field text-sm">
                </td>
                <td class="py-4 px-2 align-top text-center">
                    <input type="number" value="1" class="input-field text-center text-sm font-bold">
                </td>
                <td class="no-print py-4 text-center align-top">
                    <button onclick="removeRow(this)" class="text-red-600 font-black text-xs border border-red-200 px-2 py-1 rounded hover:bg-red-50">REMOVE</button>
                </td>
            `;
            tableBody.appendChild(row);
        }

        function removeRow(btn) {
            var tableBody = document.getElementById('item-table-body');
            if (tableBody.getElementsByTagName('tr').length > 1) {
                btn.closest('tr').remove();
            }
        }
    </script>

</body>
</html>
