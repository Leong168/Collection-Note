<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Collection Note - Frameless</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* This removes the "frame" and background during printing */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .main-container { 
                box-shadow: none !important; 
                border: none !important; 
                width: 100% !important; 
                max-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .input-field { border: none !important; border-bottom: 1px solid #000 !important; }
        }
        .input-field { width: 100%; border-bottom: 1px solid #cbd5e1; outline: none; padding: 4px; background: transparent; }
        .sku-area { min-height: 50px; resize: vertical; }
    </style>
</head>
<body class="bg-gray-200 p-2 md:p-10">

    <div class="main-container max-w-4xl mx-auto bg-white p-6 md:p-10 shadow-lg min-h-screen flex flex-col">
        
        <div class="flex justify-between items-center border-b-2 border-black pb-4 mb-8">
            <h1 class="text-2xl font-black uppercase">Collection Note</h1>
            <button onclick="window.print()" class="no-print bg-black text-white px-6 py-2 font-bold rounded hover:bg-gray-800 transition">
                PRINT NOW
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-10">
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Customer Name</label>
                    <input type="text" placeholder="Type here..." class="input-field font-bold text-lg">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Collection Address</label>
                    <textarea placeholder="Type address..." class="input-field text-sm" rows="2"></textarea>
                </div>
            </div>
            <div class="md:text-right">
                <label class="text-xs font-bold text-gray-500 uppercase">Requested By</label>
                <input type="text" placeholder="Staff Name" class="input-field md:text-right">
            </div>
        </div>

        <div class="flex-grow">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="border-b-2 border-gray-300 text-xs font-black uppercase">
                        <th class="text-left py-2" style="width: 55%;">SKU / Description</th>
                        <th class="text-left py-2" style="width: 25%;">Serial Number</th>
                        <th class="text-center py-2" style="width: 10%;">Qty</th>
                        <th class="no-print py-2" style="width: 10%;"></th>
                    </tr>
                </thead>
                <tbody id="sku-list">
                    <tr class="border-b border-gray-200">
                        <td class="py-4 pr-2">
                            <textarea placeholder="Enter SKU name (will wrap automatically)" class="input-field text-sm sku-area"></textarea>
                        </td>
                        <td class="py-4 px-1 align-top">
                            <input type="text" placeholder="S/N" class="input-field text-sm">
                        </td>
                        <td class="py-4 px-1 align-top text-center">
                            <input type="number" value="1" class="input-field text-center text-sm">
                        </td>
                        <td class="no-print py-4 text-center align-top">
                            <button onclick="deleteRow(this)" class="text-red-500 font-bold">REMOVE</button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="mt-6 no-print">
                <button onclick
