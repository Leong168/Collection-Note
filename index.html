<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Collection Note System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white shadow-xl rounded-xl overflow-hidden border border-gray-200">
        <div class="bg-slate-800 p-6 text-white text-center">
            <h1 class="text-2xl font-bold uppercase tracking-wide">Collection Note</h1>
            <p class="text-slate-400 text-sm">IT Department Asset Management</p>
        </div>

        <form id="collectionForm" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="space-y-4">
                <h3 class="font-semibold text-slate-700 border-b pb-2">Client Details</h3>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Customer Name</label>
                    <input type="text" id="customerName" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Collection Address</label>
                    <textarea id="address" rows="2" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2"></textarea>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="font-semibold text-slate-700 border-b pb-2">Asset Information</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">SKU</label>
                        <input type="text" id="sku" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Quantity</label>
                        <input type="number" id="qty" value="1" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Serial Number</label>
                    <input type="text" id="serial" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
                </div>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700">Remarks / Condition</label>
                <input type="text" id="remarks" placeholder="e.g. Minor scratches, no charger" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
            </div>

            <div class="space-y-4 md:col-span-2 grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Requested By</label>
                    <input type="text" id="requestBy" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Received By (IT Dept)</label>
                    <input type="text" id="receivedIT" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Collected By (Sign below)</label>
                    <div class="border rounded-md bg-gray-100 mt-1">
                        <canvas id="signature-pad" class="w-full h-32"></canvas>
                    </div>
                    <button type="button" id="clear" class="text-xs text-red-500 mt-1 underline">Clear Signature</button>
                </div>
            </div>

            <div class="md:col-span-2 pt-4">
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 px-4 rounded-md font-bold hover:bg-indigo-700 transition duration-200">
                    GENERATE COLLECTION NOTE
                </button>
            </div>
        </form>
    </div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const signaturePad = new SignaturePad(canvas);

        // Adjust canvas sizing
        function resizeCanvas() {
            const ratio =  Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }
        window.onresize = resizeCanvas;
        resizeCanvas();

        document.getElementById('clear').addEventListener('click', () => signaturePad.clear());

        document.getElementById('collectionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (signaturePad.isEmpty()) {
                alert("Please provide a signature for 'Collected By'");
                return;
            }

            // In a real app, you would send this to a database
            const formData = {
                customer: document.getElementById('customerName').value,
                sku: document.getElementById('sku').value,
                serial: document.getElementById('serial').value,
                itStaff: document.getElementById('receivedIT').value,
                signature: signaturePad.toDataURL()
            };

            console.log("Saving Collection Note:", formData);
            alert("Collection Note for " + formData.customer + " has been logged to console!");
        });
    </script>
</body>
</html>
