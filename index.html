<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Note</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* This ensures the page grows naturally and doesn't cut off the bottom */
        html, body { height: auto !important; overflow: visible !important; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .main-content { box-shadow: none !important; border: none !important; width: 100% !important; margin: 0 !important; }
            .line-input { border-bottom: 1px solid black !important; }
        }
        
        .line-input { border-bottom: 2px solid #e2e8f0; width: 100%; outline: none; padding: 4px; background: transparent; }
        .line-input:focus { border-bottom-color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div class="main-content max-w-4xl mx-auto bg-white p-8 md:p-12 shadow-lg border border-gray-200">
        
        <div class="no-print flex flex-wrap gap-4 justify-between items-center bg-slate-800 p-4 rounded mb-8">
            <div class="flex gap-2">
                <button onclick="setDoc('COLLECTION')" class="bg-blue-600 text-white px-4 py-2 rounded font-bold text-xs">COLLECTION MODE</button>
                <button onclick="setDoc('RETURN')" class="bg-orange-600 text-white px-4 py-2 rounded font-bold text-xs">RETURN MODE</button>
            </div>
            <button onclick="window.print()" class="bg-emerald-600 text-white px-6 py-2 rounded font-bold uppercase shadow-md">Print Hardcopy</button>
        </div>

        <div class="border-b-4 border-black pb-2 mb-10">
            <h1 id="title" class="text-4xl font-black uppercase">Collection Note</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-12">
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Customer Name</label>
                    <input type="text" placeholder="Enter Name..." class="line-input font-bold text-xl">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Address</label>
                    <textarea placeholder="Enter Address..." class="line-input text-sm" rows="2"></textarea>
                </div>
            </div>
            <div class="md:text-right">
                <label class="text-[10px] font-bold text-gray-400 uppercase">Requested By</label>
                <input type="text" placeholder="Staff Name" class="line-input md:text-right font-bold text-lg">
            </div>
        </div>

        <div class="flex border-b-2 border-black font-black text-xs uppercase text-gray-600 pb-2 mb-2">
            <div style="width: 55%;" class="px-1">SKU / Description</div>
            <div style="width: 30%;" class="px-1">Serial Number</div>
            <div style="width: 15%;" class="text-center">Qty</div>
        </div>

        <div id="sku-container" class="space-y-4">
            <div class="flex items-start border-b border-gray-100 pb-2">
                <div style="width: 55%;" class="px-1"><textarea placeholder="Item Details..." class="line-input text-sm"></textarea></div>
                <div style="width: 30%;" class="px-1"><input type="text" class="line-input text-sm"></div>
                <div style="width: 10%;" class="px-1"><input type="number" value="1" class="line-input text-center text-sm"></div>
                <button onclick="this.parentElement.remove()" class="no-print text-red-500 font-bold px-2">✕</button>
            </div>
        </div>

        <div class="mt-8 no-print">
            <button onclick="addRow()" class="w-full bg-slate-50 border-2 border-dashed border-slate-200 py-4 font-bold text-slate-400 hover:bg-slate-100 hover:text-blue-500 transition uppercase tracking-widest">
                + Add Item Row
            </button>
        </div>

        <div class="mt-12">
            <label class="text-[10px] font-bold text-gray-400 uppercase">Remarks / Condition</label>
            <input type="text" placeholder="Note condition..." class="line-input italic text-gray-700">
        </div>

        <div class="mt-24 pt-10 border-t-4 border-gray-50">
            <div class="flex justify-between gap-12 md:gap-24">
                <div class="flex-1 border-t-2 border-black pt-4">
                    <p id="sig-l" class="text-sm font-black uppercase italic">Driver / Collected By</p>
                    <p class="text-[10px] text-gray-400 mt-2 font-bold uppercase tracking-widest">Date & Time</p>
                </div>
                <div class="flex-1 border-t-2 border-black pt-4 text-right">
                    <p id="sig-r" class="text-sm font-black uppercase italic text-right">Received By (IT Dept)</p>
                    <p class="text-[10px] text-gray-400 mt-2 font-bold uppercase tracking-widest text-right">Date & Time</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function setDoc(mode) {
            document.getElementById('title').innerText = mode + " NOTE";
            if(mode === 'COLLECTION') {
                document.getElementById('sig-l').innerText = "Driver / Collected By";
                document.getElementById('sig-r').innerText = "Received By (IT Dept)";
            } else {
                document.getElementById('sig-l').innerText = "Driver / Returned By";
                document.getElementById('sig-r').innerText = "Received By (Customer)";
            }
        }

        function addRow() {
            var container = document.getElementById('sku-container');
            var div = document.createElement('div');
            div.className = "flex items-start border-b border-gray-100 pb-2";
            div.innerHTML = '<div style="width: 55%;" class="px-1"><textarea placeholder="Item Details..." class="line-input text-sm"></textarea></div>' +
                            '<div style="width: 30%;" class="px-1"><input type="text" class="line-input text-sm"></div>' +
                            '<div style="width: 10%;" class="px-1"><input type="number" value="1" class="line-input text-center text-sm"></div>' +
                            '<button onclick="this.parentElement.remove()" class="no-print text-red-500 font-bold px-2">✕</button>';
            container.appendChild(div);
        }
    </script>
</body>
</html>
