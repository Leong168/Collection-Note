<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT Collection & Return System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .content { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; }
        }
        .line { border-bottom: 1px solid #ccc; width: 100%; outline: none; padding: 5px; }
        .wrap-text { min-height: 40px; width: 100%; border: 1px solid #eee; padding: 5px; resize: vertical; }
    </style>
</head>
<body class="bg-gray-200 p-2 sm:p-10">

    <div class="content max-w-4xl mx-auto bg-white p-8 shadow-2xl min-h-screen">
        
        <div class="no-print bg-slate-100 p-4 rounded mb-10 flex flex-wrap gap-4 justify-between items-center border border-slate-300">
            <div class="flex gap-2">
                <button onclick="document.getElementById('title').innerText='COLLECTION NOTE'; document.getElementById('l-sig').innerText='Driver / Collected By'; document.getElementById('r-sig').innerText='Received By (IT Dept)';" class="bg-blue-700 text-white px-4 py-2 rounded text-xs font-bold uppercase">Collection Mode</button>
                <button onclick="document.getElementById('title').innerText='RETURN NOTE'; document.getElementById('l-sig').innerText='Driver / Returned By'; document.getElementById('r-sig').innerText='Received By (Customer)';" class="bg-orange-700 text-white px-4 py-2 rounded text-xs font-bold uppercase">Return Mode</button>
            </div>
            <button onclick="window.print()" class="bg-emerald-600 text-white px-8 py-2 rounded font-bold uppercase shadow-lg">Print Hardcopy</button>
        </div>

        <div class="border-b-4 border-black pb-2 mb-10 text-center md:text-left">
            <h1 id="title" class="text-4xl font-black uppercase tracking-tighter">COLLECTION NOTE</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-10">
            <div class="space-y-4">
                <label class="text-[10px] font-bold text-gray-400 block uppercase">Customer & Address</label>
                <input type="text" placeholder="Customer Name" class="line font-bold text-xl mb-2">
                <textarea placeholder="Full Address" class="line text-sm" rows="2"></textarea>
            </div>
            <div class="md:text-right">
                <label class="text-[10px] font-bold text-gray-400 block uppercase">Requested By</label>
                <input type="text" placeholder="Staff Name" class="line md:text-right font-medium">
            </div>
        </div>
