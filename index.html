<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Collection Note - Long SKU Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            .container-box { border: 1px solid #000; box-shadow: none; width: 100% !important; margin: 0; }
            body { background: white; }
        }
        /* Allows the SKU cell to grow vertically */
        .editable-cell {
            display: block;
            width: 100%;
            min-height: 1.5rem;
            border-bottom: 1px solid #e2e8f0;
            outline: none;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .editable-cell:focus { border-bottom: 2px solid #6366f1; }
        
        /* Standard inputs for S/N and Qty */
        .line-input { border-bottom: 1px solid #e2e8f0; width: 100%; outline: none; padding: 4px 0; background: transparent; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-10">

    <div class="max-w-4xl mx-auto bg-white shadow-xl rounded-lg container-box">
        <div class="bg-slate-800 text-white p-6 flex justify-between items-center print:bg-white print:text-black print:border-b">
            <h1 class="text-xl font-bold uppercase tracking-widest">Collection Note</h1>
            <button onclick="window.print()" class="no-print bg-emerald-600 px-4 py-2 rounded font-bold hover:bg-emerald-700 transition">
                PRINT FOR DRIVER
            </button>
        </div>

        <div class="p-8 space-y-6">
            <div class="grid grid-cols-2 gap-8">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Customer Name</label>
                    <input type="text" placeholder="Enter Name" class="line-input font-bold">
                    <label class="text-[10px] font-bold text-gray-400 uppercase mt-4 block">Collection Address</label>
                    <textarea placeholder="Enter Full Address" class="line-input text-sm" rows="2"></textarea>
                </div>
                <div class="text-right">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Requested By</label>
                    <input type="text" placeholder="Staff Name" class="line-input text-right">
                </div>
            </div>

            <div class="mt-8">
                <table class="w-full table-fixed border-collapse" id="mainTable">
                    <thead>
                        <tr class="border-b-2 border-slate-200 text-[10px] uppercase text-gray-500">
                            <th class="text-left pb-2 px-1 w-1/2">SKU / Description</th>
                            <th class="text-left
