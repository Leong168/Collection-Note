<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection / Return Note</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { height: auto !important; overflow: auto !important; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .content-wrapper { box-shadow: none !important; border: none !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .input-field { border: none !important; border-bottom: 1px solid #000 !important; }
            .signature-section { page-break-inside: avoid; }
        }
        .input-field { width: 100%; border-bottom: 1px solid #cbd5e1; outline: none; padding: 6px; background: transparent; }
        .sku-textarea { min-height: 60px; resize: vertical; display: block; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-10">

    <div class="content-wrapper max-w-4xl mx-auto bg-white p-8 md:p-12 shadow-lg rounded-sm">
        
        <div class="no-print mb-6 p-4 bg-slate-100 rounded flex items-center justify-between">
            <span class="font-bold text-slate-700 uppercase text-xs tracking-widest">Document Type:</span>
            <div class="inline-flex rounded-md shadow-sm">
                <button onclick="setType('Collection')" id="btn-coll" class="bg-blue-600 text-white px-4 py-2 text-xs font-bold rounded-l-md border border-blue-600">COLLECTION</button>
                <button onclick="setType('Return')" id="btn-ret" class="bg-white text-blue-600 px-4 py-2 text-xs font-bold rounded-r-md border border-blue-600 hover:bg-blue-50">RETURN</button>
            </div>
        </div>

        <div class="flex justify-between items-center border-b-4 border-black pb-4 mb-10">
            <div>
                <h1 id="doc-title" class="text-3xl font-black uppercase tracking-tighter">Collection Note</h1>
            </div>
            <button onclick="window.print()" class="no-print bg-emerald-600 text-white px-8 py-3 font-black rounded shadow-lg hover:bg-emerald-700 active:scale-95 transition">
                PRINT HARDCOPY
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 mb-12">
            <div class="space-y-6">
                <div>
                    <label class="text-xs font-black uppercase text-gray-400">Customer Name</label>
                    <input type="text" placeholder="Enter Client Name" class="input-field font-bold text-xl">
                </div>
                <div>
                    <label class="text-xs font-black uppercase text-gray-400">Address</label>
                    <textarea placeholder="Enter Address" class="input-field text-sm" rows="2"></textarea>
                </div>
            </div>
            <div class="md:text-right space-y-6">
                <div>
                    <label class="text-xs font-black uppercase text-gray-400">Requested By</label>
                    <input type="text" placeholder="Staff Name" class="input-field md:text-right font-bold text-lg">
                </div>
            </div>
        </div>

        <div class="mb-8">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="border-b-2 border-black text-sm font-black uppercase">
                        <th class="text-left py-2" style="width: 50%;">SKU / Item Description</th>
                        <th class="text-left py-2" style="width: 30%;">Serial Number</th>
                        <th class="text-center py-2" style="width: 10%;">Qty</th>
                        <th class="no-print py-2" style="width: 10%;"></th>
                    </tr>
                </thead>
                <tbody id="item-table-body">
                    <tr class="border-b border-gray-2
