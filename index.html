<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT Collection & Return Note</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .content-wrapper { box-shadow: none !important; width: 100% !important; margin: 0 !important; }
        }
        .input-underline { border-bottom: 2px solid #e2e8f0; width: 100%; outline: none; padding: 4px; background: transparent; }
        .input-underline:focus { border-bottom-color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">

    <div class="content-wrapper max-w-4xl mx-auto bg-white p-8 md:p-12 shadow-lg min-h-screen flex flex-col border border-gray-200">
        
        <div class="no-print bg-slate-900 p-4 rounded mb-8 flex justify-between items-center shadow-md">
            <div class="flex gap-3">
                <button onclick="setMode('COLLECTION')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-xs font-bold uppercase tracking-wider transition">Collection Note</button>
                <button onclick="setMode('RETURN')" class="bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 rounded text-xs font-bold uppercase tracking-wider transition">Return Note</button>
            </div>
            <button onclick="window.print()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded font-bold uppercase tracking-widest shadow-lg active:scale-95 transition">Print Hardcopy</button>
        </div>

        <div class="border-b-8 border-black pb-4 mb-10">
            <h1 id="doc-title" class="text-4xl font-black uppercase tracking-tighter italic">COLLECTION NOTE</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 mb-12">
            <div class="space-y-6">
                <div>
                    <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Customer / Company Name</label>
                    <input type="text" placeholder="Enter Name..." class="input-underline font-bold text-xl">
                </div>
                <div>
                    <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Address / Location</label>
                    <textarea placeholder="Enter Full Address..." class="input-underline text-sm" rows="2"></textarea>
                </div>
            </div>
            <div class="md:text-right space-y-6">
                <div>
                    <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Requested By</label>
                    <input type="text" placeholder="Staff Name" class="input-underline md:text-right font-bold text-lg">
                </div>
            </div>
        </div>

        <div class="flex-grow">
            <div class="border-b-2 border-black pb-2 mb-4 flex font-black text-xs uppercase text-gray-600">
                <div style="width: 55%;">SKU / Description</div>
                <div style="width: 30%;">Serial Number</div>
                <div style="width: 15%;" class="text-center">Qty</div>
            </div>

            <div id="item-list" class="space-y-4">
                <div class="flex items-start gap-2 border-b border-gray-100 pb-2">
                    <div style="width: 55%;"><textarea placeholder="Item Details..." class="input-underline text-sm resize-y min-h-[40px]"></textarea></div>
                    <div style="width: 30%;"><input type="text" placeholder="S/N" class="input-underline text-sm"></div>
                    <div style="width: 10%;"><input type="number" value="1" class="input-underline text-center text-sm font-bold"></div>
                    <button onclick="this.parentElement.remove()" class="no-print text-red-400 hover:text-red-600 font-bold p-1">✕</button>
                </div>
            </div>

            <button onclick="addNewRow()" class="no-print mt-8 w-full border-2 border-dashed border-gray-300 py-4 text-gray-400 font-black uppercase tracking-widest hover:bg-gray-50 hover:text-blue-500 hover:border-blue-300 transition">
                + Add Item Row
            </button>
        </div>

        <div class="mt-12">
            <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Remarks / Item Condition</label>
            <input type="text" placeholder="e.g. Scratched, no power adapter..." class="input-underline italic text-gray-700">
        </div>

        <div class="mt-20 pt-10 border-t-4 border-gray-50">
            <div class="grid grid-cols-2 gap-16 md:gap-32">
                <div
