            body { background: white !important; padding: 0 !important; }

            .input-line { border-bottom: 1px solid #000 !important; }

        .input-line { border-bottom: 2px solid #e2e8f0; width: 100%; outline: none; padding: 4px; background: transparent; }
        .input-line:focus { border-bottom-color: #3b82f6; }
    </style>
</head>
