<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Note System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Forces the page to show everything during print */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .content-box { border: none !important; box-shadow: none !important; width: 100% !important; }
            .input-line { border-bottom: 1px solid black !important; }
        }
        .input-line { border-bottom: 1px solid #cbd5e1; width: 100%; outline: none; padding: 4px; background: transparent; }
        .sku-box { min-height: 50px; border: 1px solid #e2e8f0; padding: 5px; width: 100%; }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div class="content-box max-w-4xl mx-auto bg-white p-8 shadow-lg min-h-screen">
        
        <div class="no-print bg-slate-800 p-4 rounded-t mb-6 flex justify-between items-center">
            <div class="flex gap-2">
                <button onclick="changeDoc('Collection')" class="bg-blue-600 text-white px-4 py-2 rounded font-bold text-xs uppercase">Set to Collection</button>
                <button onclick="changeDoc('Return')" class="bg-orange-600 text-white px-4 py-2 rounded font-bold text-xs uppercase">Set to Return</button>
            </div>
            <button onclick="window.print()" class="bg-emerald-500 text-white px-6 py-2 rounded font-bold uppercase">Print Now</button>
        </div>

        <div class="border-b-4 border-black pb-4 mb-8">
            <h1 id="title" class="text-3xl font-black uppercase">Collection Note</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Customer Name</label>
                    <input type="text" placeholder="Enter Name" class="input-line font-bold text-xl">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Address</label>
                    <textarea placeholder="Enter Address" class="input-line text-sm" rows="2"></textarea>
                </div>
            </div>
            <div class="md:text-right">
                <label class="text-[10px] font-bold text-gray-400 uppercase">Requested By</label>
                <input type="text" placeholder="Staff Name" class="input-line md:text-right">
            </div>
        </div>

        <div class="mb-10">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="border-b-2 border-black text-xs font-bold uppercase">
                        <th class="text-left py-2 px-1" style="width: 50%;">SKU / Description</th>
                        <th class="text-left py-2 px-1" style="width: 30%;">Serial Number</th>
                        <th class="text-center py-2 px-1" style="width: 10%;">Qty</th>
                        <th class="no-print w-10"></th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr class="border-b border-gray-100">
                        <td class="py-3 px-1">
                            <textarea placeholder="Enter SKU name" class="sku-box text-sm"></textarea>
